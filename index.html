<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Sukutyi Escape - Level & Lives Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        body {
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            flex-direction: column;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 750px;
            background: #111;
            display: flex;
            flex-direction: column;
            border: 2px solid #ff3333;
        }
        canvas {
            width: 100%;
            flex-grow: 1;
            background: #0a0a0f;
            display: block;
        }
        /* Panel Kontrol D-Pad untuk HP */
        .controls-panel {
            height: 220px;
            background: #15151c;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-top: 3px solid #ff3333;
        }
        .dpad {
            position: relative;
            width: 160px;
            height: 160px;
        }
        .dbtn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 51, 51, 0.3);
            border: 3px solid #ff3333;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(255,51,51,0.2);
        }
        .dbtn:active {
            background: rgba(255, 51, 51, 0.8);
            transform: scale(0.9);
        }
        #btnUp    { top: 0; left: 55px; }
        #btnDown  { bottom: 0; left: 55px; }
        #btnLeft  { top: 55px; left: 0; }
        #btnRight { top: 55px; right: 0; }

        /* Panel UI Atas */
        .score-ui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            color: #ff3333;
            font-size: 14px;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 3px solid #ff3333;
            pointer-events: none;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ui-stats {
            display: flex;
            gap: 12px;
        }
        .level-badge {
            color: #ffff00;
            text-shadow: 0 0 5px rgba(255, 255, 0, 0.5);
        }
        
        /* Container untuk Foto Logo JPEG */
        .lives-container {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .heart-img {
            width: 25px; /* Sesuaikan ukuran logo di sini */
            height: 25px;
            object-fit: cover;
            border-radius: 4px; /* Membuat sudut gambar sedikit melengkung */
            border: 1px solid #ff3333;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameWindow">
        <div class="score-ui">
            <div class="ui-stats">
                <div>WAKTU: <span id="timerVal">0</span>s</div>
                <div class="level-badge">LV: <span id="levelVal">1</span></div>
            </div>
            <!-- Container tempat 3 foto logo JPEG dirender -->
            <div class="lives-container" id="livesVal">
                <img class="heart-img" id="heart-0" src="" alt="L1">
                <img class="heart-img" id="heart-1" src="" alt="L2">
                <img class="heart-img" id="heart-2" src="" alt="L3">
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        
        <div class="controls-panel">
            <div class="dpad">
                <div class="dbtn" id="btnUp">▲</div>
                <div class="dbtn" id="btnLeft">◀</div>
                <div class="dbtn" id="btnRight">▶</div>
                <div class="dbtn" id="btnDown">▼</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const timerVal = document.getElementById("timerVal");
        const levelVal = document.getElementById("levelVal");
        
        // ========================================================
        // SILAHKAN GANTI NAMA FILE JPEG ANDA DI BAWAH INI
        // ========================================================
        const LOGO_1 = "logo1.jpeg"; 
        const LOGO_2 = "logo2.jpeg"; 
        const LOGO_3 = "logo3.jpeg"; 
        // ========================================================

        let survivalTime = 0;
        let currentLevel = 1;
        let lives = 3;
        let gameOver = false;
        let gameInterval;
        let keys = { up: false, down: false, left: false, right: false };
        let levelUpAnimTimer = 0;
        let immunityTimer = 0; 

        const player = {
            x: 200, y: 250,
            size: 16, speed: 4,
            color: "#00ffff"
        };

        const sukutyi = {
            x: 30, y: 30,
            size: 20, speed: 2.2,
            baseSize: 20,
            color: "#ff3333",
            glow: 0
        };

        const item = {
            x: Math.random() * 360 + 20,
            y: Math.random() * 460 + 20,
            size: 10
        };

        function setupTouchBtn(id, key) {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; checkRestart(); });
            btn.addEventListener("touchend", () => keys[key] = false);
            btn.addEventListener("mousedown", () => { keys[key] = true; checkRestart(); });
            btn.addEventListener("mouseup", () => keys[key] = false);
            btn.addEventListener("mouseleave", () => keys[key] = false);
        }

        setupTouchBtn("btnUp", "up");
        setupTouchBtn("btnDown", "down");
        setupTouchBtn("btnLeft", "left");
        setupTouchBtn("btnRight", "right");

        window.addEventListener("keydown", (e) => {
            if(gameOver) { resetGame(); return; }
            if(e.key === "ArrowUp" || e.key === "w") keys.up = true;
            if(e.key === "ArrowDown" || e.key === "s") keys.down = true;
            if(e.key === "ArrowLeft" || e.key === "a") keys.left = true;
            if(e.key === "ArrowRight" || e.key === "d") keys.right = true;
        });
        window.addEventListener("keyup", (e) => {
            if(e.key === "ArrowUp" || e.key === "w") keys.up = false;
            if(e.key === "ArrowDown" || e.key === "s") keys.down = false;
            if(e.key === "ArrowLeft" || e.key === "a") keys.left = false;
            if(e.key === "ArrowRight" || e.key === "d") keys.right = false;
        });

        function checkRestart() {
            if(gameOver) resetGame();
        }

        // Fungsi Update Tampilan Gambar JPEG Nyawa
        function updateLivesUI() {
            const h1 = document.getElementById("heart-0");
            const h2 = document.getElementById("heart-1");
            const h3 = document.getElementById("heart-2");

            // Pasang gambar JPEG ke elemen masing-masing
            if(h1) h1.src = LOGO_1;
            if(h2) h2.src = LOGO_2;
            if(h3) h3.src = LOGO_3;

            // Atur opacity (transparansi) berdasarkan jumlah sisa nyawa
            if(h1) h1.style.opacity = (lives >= 1) ? "1" : "0.1";
            if(h2) h2.style.opacity = (lives >= 2) ? "1" : "0.1";
            if(h3) h3.style.opacity = (lives >= 3) ? "1" : "0.1";
        }

        function resetGame() {
            player.x = 200; player.y = 250;
            sukutyi.x = 30; sukutyi.y = 30;
            sukutyi.size = sukutyi.baseSize;
            sukutyi.speed = 2.2;
            survivalTime = 0;
            currentLevel = 1;
            lives = 3;
            levelUpAnimTimer = 0;
            immunityTimer = 0;
            
            timerVal.innerText = survivalTime;
            levelVal.innerText = currentLevel;
            
            updateLivesUI();
            
            gameOver = false;
            keys = { up: false, down: false, left: false, right: false };
            
            clearInterval(gameInterval);
            gameInterval = setInterval(() => { 
                if(!gameOver) { 
                    survivalTime++; 
                    timerVal.innerText = survivalTime; 
                    
                    sukutyi.speed += 0.08; 

                    if (survivalTime % 15 === 0) {
                        currentLevel++;
                        levelVal.innerText = currentLevel;
                        levelUpAnimTimer = 90; 
                        
                        sukutyi.speed += 0.5;
                        sukutyi.size = sukutyi.baseSize + (currentLevel * 2); 
                    }
                } 
            }, 1000);
            
            requestAnimationFrame(update);
        }

        function update() {
            if (gameOver) {
                ctx.fillStyle = "rgba(10, 0, 0, 0.9)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#ff0000";
                ctx.font = "bold 28px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("SUKUTYI MENEMUKANMU!", canvas.width / 2, canvas.height / 2 - 50);

                ctx.fillStyle = "#ffff00";
                ctx.font = "bold 20px monospace";
                ctx.fillText(`Mencapai Level: ${currentLevel}`, canvas.width / 2, canvas.height / 2 - 10);

                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(canvas.width/2 - 40, canvas.height/2 + 50, 15, 0, Math.PI*2);
                ctx.arc(canvas.width/2 + 40, canvas.height/2 + 50, 15, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.arc(canvas.width/2 - 40, canvas.height/2 + 54, 6, 0, Math.PI*2);
                ctx.arc(canvas.width/2 + 40, canvas.height/2 + 54, 6, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = "#888";
                ctx.font = "14px monospace";
                ctx.fillText("Tekan D-Pad Mana Saja untuk Coba Lagi", canvas.width / 2, canvas.height / 2 + 140);
                ctx.textAlign = "left";
                return;
            }

            if (immunityTimer > 0) immunityTimer--;

            if (keys.up && player.y > player.size) player.y -= player.speed;
            if (keys.down && player.y < canvas.height - player.size) player.y += player.speed;
            if (keys.left && player.x > player.size) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - player.size) player.x += player.speed;

            let dx = player.x - sukutyi.x;
            let dy = player.y - sukutyi.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 0) {
                sukutyi.x += (dx / distance) * sukutyi.speed;
                sukutyi.y += (dy / distance) * sukutyi.speed;
            }

            let itemDist = Math.sqrt((player.x - item.x)**2 + (player.y - item.y)**2);
            if (itemDist < player.size + item.size) {
                item.x = Math.random() * (canvas.width - 40) + 20;
                item.y = Math.random() * (canvas.height - 40) + 20;
                sukutyi.speed = Math.max(1.5 + (currentLevel * 0.2), sukutyi.speed - 1.0); 
            }

            if (distance < player.size + sukutyi.size && immunityTimer === 0) {
                lives--;
                updateLivesUI();
                
                if (navigator.vibrate) navigator.vibrate([150, 50, 150]);

                if (lives <= 0) {
                    gameOver = true;
                } else {
                    player.x = 200;
                    player.y = 250;
                    sukutyi.x = 30;
                    sukutyi.y = 30;
                    immunityTimer = 90; 
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let gradient = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 135);
            gradient.addColorStop(0, 'rgba(255, 255, 230, 0.35)');
            gradient.addColorStop(1, 'rgba(5, 5, 10, 0.98)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff00";
            ctx.shadowColor = "#00ff00"; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(item.x, item.y, item.size, 0, Math.PI*2); ctx.fill();

            if (immunityTimer === 0 || Math.floor(immunityTimer / 5) % 2 === 0) {
                ctx.fillStyle = player.color;
                ctx.shadowColor = player.color; ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
            }

            sukutyi.glow += 0.1;
            let dynamicGlow = Math.abs(Math.sin(sukutyi.glow)) * 15 + 5;
            ctx.fillStyle = sukutyi.color;
            ctx.shadowColor = "#ff0000"; ctx.shadowBlur = dynamicGlow;
            ctx.beginPath();
            ctx.arc(sukutyi.x, sukutyi.y, sukutyi.size, 0, Math.PI*2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(sukutyi.x - (sukutyi.size/3), sukutyi.y - 4, 4, 4);
            ctx.fillRect(sukutyi.x + (sukutyi.size/3) - 4, sukutyi.y - 4, 4, 4);

            if (levelUpAnimTimer > 0) {
                levelUpAnimTimer--;
                ctx.fillStyle = `rgba(255, 255, 0, ${levelUpAnimTimer / 90})`;
                ctx.font = "bold 28px 'Courier New'";
                ctx.textAlign = "center";
                ctx.shadowColor = "#ffff00"; ctx.shadowBlur = 10;
                ctx.fillText(`LEVEL ${currentLevel}!`, canvas.width / 2, 100);
                ctx.shadowBlur = 0;
                ctx.textAlign = "left";
            }

            requestAnimationFrame(update);
        }

        resetGame();
    </script>
</body>
</html>
